services:
  mysql:
    image: mysql:8.0
    container_name: crst-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: climate_risk_stress
      MYSQL_USER: crst
      MYSQL_PASSWORD: crst123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
